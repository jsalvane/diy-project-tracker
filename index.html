<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0520" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DIY Tracker" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DIY Project Tracker</title>
    <script>
      // Prevent dark mode flash
      try {
        const data = JSON.parse(localStorage.getItem('diy-project-tracker') || '{}');
        if (data.darkMode) document.documentElement.classList.add('dark');
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
